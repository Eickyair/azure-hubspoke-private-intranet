<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - Northwind</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Directorio Corporativo</h1>
            <p class="subtitle">Northwind Distribución - Intranet Privada</p>
            
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('employees')">Gestión de Empleados</button>
                <button class="tab-btn" onclick="switchTab('products')">Gestión de Productos</button>
            </div>
            
            <div class="header-actions" id="employeeActions">
                <select id="statusFilter" class="btn btn-secondary" style="margin-right: 8px;" onchange="fetchEmployees()">
                    <option value="all" selected>Todos los Empleados</option>
                    <option value="true">Solo Activos</option>
                    <option value="false">Solo Inactivos</option>
                </select>
                <button class="btn btn-primary" onclick="openAddModal()">+ Nuevo Empleado</button>
            </div>
            
            <div class="header-actions" id="productActions" style="display: none;">
                <button class="btn btn-primary" style="background-color: #f90; color: #111;" onclick="openAddProductModal()">+ Nuevo Producto</button>
            </div>
        </header>

        <main id="app">
            <!-- TAB EMPLEADOS -->
            <div id="tabEmployees">
                <div class="loader" id="loader">Cargando directorio...</div>
                <div class="employee-grid" id="grid"></div>
            </div>
            
            <!-- TAB PRODUCTOS -->
            <div id="tabProducts" style="display: none;">
                <div class="loader" id="productLoader" style="display: none;">Cargando catálogo...</div>
                <div class="employee-grid" id="productGrid"></div> <!-- Reusing grid styles -->
            </div>
        </main>
    </div>

    <!-- Modal Agregar Empleado -->
    <div class="modal-overlay" id="addModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Registrar Empleado</h2>
                <button class="close-btn" onclick="closeAddModal()">&times;</button>
            </div>
            <form id="addForm" onsubmit="submitEmployee(event)">
                <div class="form-group">
                    <label>Nombre(s)</label>
                    <input type="text" id="first_name" required>
                </div>
                <div class="form-group">
                    <label>Apellidos</label>
                    <input type="text" id="last_name" required>
                </div>
                <div class="form-group">
                    <label>Puesto</label>
                    <input type="text" id="position" required>
                </div>
                <div class="form-group">
                    <label>Departamento</label>
                    <select id="department" required>
                        <option value="Operaciones">Operaciones</option>
                        <option value="TI">TI</option>
                        <option value="Comercial">Comercial</option>
                        <option value="Recursos Humanos">Recursos Humanos</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Correo Electrónico</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>Foto de Perfil (Opcional)</label>
                    <input type="file" id="profile_picture" accept="image/*">
                </div>
                <div class="form-group">
                    <label>Documento / Contrato (Opcional, PDF)</label>
                    <input type="file" id="document" accept=".pdf">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeAddModal()">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal Agregar Producto -->
    <div class="modal-overlay" id="addProductModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Registrar Producto</h2>
                <button class="close-btn" onclick="closeAddProductModal()">&times;</button>
            </div>
            <form id="addProductForm" onsubmit="submitProduct(event)">
                <div class="form-group">
                    <label>SKU</label>
                    <input type="text" id="prod_sku" required>
                </div>
                <div class="form-group">
                    <label>Nombre del Producto</label>
                    <input type="text" id="prod_name" required>
                </div>
                <div class="form-group">
                    <label>Categoría</label>
                    <select id="prod_category" required>
                        <option value="Electrónica">Electrónica</option>
                        <option value="Oficina">Oficina</option>
                        <option value="Limpieza">Limpieza</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Precio ($)</label>
                    <input type="number" step="0.01" id="prod_price" required>
                </div>
                <div class="form-group">
                    <label>Stock (Unidades)</label>
                    <input type="number" id="prod_stock" required>
                </div>
                <div class="form-group">
                    <label>Descripción</label>
                    <textarea id="prod_desc" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>Imagen del Producto (Opcional)</label>
                    <input type="file" id="prod_image" accept="image/*">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeAddProductModal()">Cancelar</button>
                    <button type="submit" class="btn btn-primary" style="background-color: #f90; color: #111;">Guardar Producto</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal Ver Perfil Empleado -->
    <div class="modal-overlay" id="profileModal">
        <div class="modal-content profile-detail" id="profileContent">
            <!-- Content injected via JS -->
        </div>
    </div>

    <script>
        const API_BASE_URL = "{{ api_base_url }}";
        const CATALOG_API_URL = "{{ catalog_api_url }}";

        // TABS LOGIC
        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('tabEmployees').style.display = 'none';
            document.getElementById('tabProducts').style.display = 'none';
            document.getElementById('employeeActions').style.display = 'none';
            document.getElementById('productActions').style.display = 'none';

            if(tabName === 'employees') {
                event.target.classList.add('active');
                document.getElementById('tabEmployees').style.display = 'block';
                document.getElementById('employeeActions').style.display = 'flex';
                fetchEmployees();
            } else {
                event.target.classList.add('active');
                document.getElementById('tabProducts').style.display = 'block';
                document.getElementById('productActions').style.display = 'flex';
                fetchProducts();
            }
        }

        // ---------------- EMPLOYEES LOGIC ----------------

        async function fetchEmployees() {
            try {
                const filter = document.getElementById('statusFilter').value;
                let url = `${API_BASE_URL}/employees`;
                if(filter === 'true') url += '?is_active=true';
                if(filter === 'false') url += '?is_active=false';

                const response = await fetch(url);
                const employees = await response.json();
                renderEmployees(employees);
            } catch (error) {
                console.error("Error fetching employees:", error);
                document.getElementById('grid').innerHTML = '<div style="grid-column: 1/-1; text-align:center; color:#ef4444;">Error conectando a la API Privada</div>';
            }
        }

        function renderEmployees(employees) {
            const grid = document.getElementById('grid');
            const loader = document.getElementById('loader');
            
            loader.style.display = 'none';
            grid.innerHTML = '';

            if(employees.length === 0) {
                grid.innerHTML = '<p style="text-align:center; grid-column: 1/-1; color: #64748b;">No hay empleados registrados.</p>';
                return;
            }

            employees.forEach(emp => {
                const card = document.createElement('div');
                card.className = 'employee-card';
                card.onclick = () => openProfile(emp);
                
                if(!emp.is_active) {
                    card.style.opacity = '0.7';
                    card.style.filter = 'grayscale(1)';
                }
                
                let activeBadge = emp.is_active ? 
                    `<span style="background:#22c55e; color:white; padding:2px 8px; border-radius:12px; font-size:0.7rem; position:absolute; top:12px; right:12px;">Activo</span>` : 
                    `<span style="background:#ef4444; color:white; padding:2px 8px; border-radius:12px; font-size:0.7rem; position:absolute; top:12px; right:12px;">Inactivo</span>`;

                card.style.position = 'relative';
                
                let avatarHtml = '';
                if (emp.profile_picture_url) {
                    avatarHtml = `<img src="${emp.profile_picture_url}" alt="${emp.first_name}" class="avatar">`;
                } else {
                    const initials = emp.first_name.charAt(0) + emp.last_name.charAt(0);
                    avatarHtml = `<div class="avatar-placeholder">${initials.toUpperCase()}</div>`;
                }

                card.innerHTML = `
                    ${activeBadge}
                    <div class="avatar-container">
                        ${avatarHtml}
                    </div>
                    <h3 class="name">${emp.first_name} ${emp.last_name}</h3>
                    <div class="position">${emp.position}</div>
                `;
                grid.appendChild(card);
            });
        }

        function openAddModal() {
            document.getElementById('addModal').classList.add('active');
        }

        function closeAddModal() {
            document.getElementById('addModal').classList.remove('active');
            document.getElementById('addForm').reset();
        }

        function openProfile(emp) {
            let avatarHtml = `<div class="avatar-placeholder" style="width:120px; height:120px; font-size:40px; margin-bottom:16px; border-radius:50%; border:4px solid white; box-shadow:0 4px 6px rgba(0,0,0,0.05); background:#e2e8f0; display:flex; align-items:center; justify-content:center;">${emp.first_name[0]}${emp.last_name[0]}</div>`;
            if(emp.profile_picture_url) {
                const imgUrl = emp.profile_picture_url.startsWith('/') ? `${API_BASE_URL.replace('/api', '')}${emp.profile_picture_url}` : emp.profile_picture_url;
                avatarHtml = `<img src="${imgUrl}" style="width:120px; height:120px; border-radius:50%; object-fit:cover; margin-bottom:16px; border:4px solid white; box-shadow:0 4px 6px rgba(0,0,0,0.05);">`;
            }

            const content = document.getElementById('profileContent');
            content.innerHTML = `
                <div class="modal-header" style="width: 100%; border-bottom: 1px solid rgba(255,255,255,0.4); padding-bottom:16px;">
                    <h2 style="font-size:1.2rem;">Perfil Corporativo</h2>
                    <button class="close-btn" onclick="document.getElementById('profileModal').classList.remove('active')">&times;</button>
                </div>
                ${avatarHtml}
                <div style="margin-bottom: 16px;">
                    <input type="file" id="changePicInput_${emp.id}" style="display:none;" accept="image/*" onchange="uploadNewPicture(${emp.id})">
                    <button class="btn btn-secondary" style="font-size: 0.75rem; padding: 4px 8px;" onclick="document.getElementById('changePicInput_${emp.id}').click()">Cambiar Foto</button>
                    
                    <input type="file" id="changeDocInput_${emp.id}" style="display:none;" accept=".pdf" onchange="uploadNewDocument(${emp.id})">
                    <button class="btn btn-secondary" style="font-size: 0.75rem; padding: 4px 8px; margin-left: 8px;" onclick="document.getElementById('changeDocInput_${emp.id}').click()">Subir/Cambiar Doc</button>
                </div>
                <h2 style="margin-bottom:8px;">${emp.first_name} ${emp.last_name}</h2>
                <div style="color: #2563eb; font-weight:600; font-size:1.1rem; margin-bottom:4px;">${emp.position}</div>
                <div class="department">${emp.department}</div>
                
                <div style="margin-top: 16px;">
                    <button class="btn btn-secondary" onclick="toggleStatus(${emp.id})">${emp.is_active ? 'Desactivar Empleado' : 'Reactivar Empleado'}</button>
                </div>
            `;
            document.getElementById('profileModal').classList.add('active');
        }

        async function submitEmployee(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.innerText = 'Guardando...';
            btn.disabled = true;

            const formData = new FormData();
            formData.append('first_name', document.getElementById('first_name').value);
            formData.append('last_name', document.getElementById('last_name').value);
            formData.append('position', document.getElementById('position').value);
            formData.append('department', document.getElementById('department').value);
            formData.append('email', document.getElementById('email').value);
            
            const profilePic = document.getElementById('profile_picture').files[0];
            if(profilePic) formData.append('profile_picture', profilePic);
            
            const doc = document.getElementById('document').files[0];
            if(doc) formData.append('document', doc);

            try {
                const response = await fetch(`${API_BASE_URL}/employees`, {
                    method: 'POST',
                    body: formData
                });
                
                if(!response.ok) throw new Error("Error al guardar");
                
                closeAddModal();
                fetchEmployees();
            } catch (error) {
                alert("Hubo un error al guardar.");
            } finally {
                btn.innerText = 'Guardar';
                btn.disabled = false;
            }
        }

        async function uploadNewPicture(empId) {
            // omitted for brevity
        }

        async function uploadNewDocument(empId) {
            // omitted for brevity
        }

        async function toggleStatus(empId) {
            try {
                const response = await fetch(`${API_BASE_URL}/employees/${empId}/toggle-status`, { method: 'PATCH' });
                if(!response.ok) throw new Error("Error cambiando status");
                document.getElementById('profileModal').classList.remove('active');
                fetchEmployees();
            } catch (e) {
                alert("Hubo un error al cambiar el status.");
            }
        }


        // ---------------- PRODUCTS LOGIC ----------------

        async function fetchProducts() {
            try {
                const loader = document.getElementById('productLoader');
                loader.style.display = 'block';
                
                const response = await fetch(`${CATALOG_API_URL}/products`);
                const products = await response.json();
                renderProducts(products);
            } catch (error) {
                console.error("Error fetching products:", error);
                document.getElementById('productGrid').innerHTML = '<div style="grid-column: 1/-1; text-align:center; color:#ef4444;">Error conectando a la API de Catálogo</div>';
            }
        }

        function renderProducts(products) {
            const grid = document.getElementById('productGrid');
            const loader = document.getElementById('productLoader');
            
            loader.style.display = 'none';
            grid.innerHTML = '';

            if(products.length === 0) {
                grid.innerHTML = '<p style="text-align:center; grid-column: 1/-1; color: #64748b;">No hay productos registrados.</p>';
                return;
            }

            products.forEach(p => {
                const card = document.createElement('div');
                card.className = 'employee-card'; // re-use card style
                card.style.textAlign = 'left';
                
                let imageHtml = '<div class="avatar-placeholder" style="width:100%; height:150px; border-radius:8px;">📦</div>';
                if (p.image_blob) {
                    imageHtml = `<img src="${CATALOG_API_URL}/storage/${p.image_blob}" style="width:100%; height:150px; object-fit:contain; margin-bottom:10px;">`;
                }

                card.innerHTML = `
                    ${imageHtml}
                    <div style="font-size:0.8rem; color:#666;">${p.category} | ${p.sku}</div>
                    <h3 class="name" style="margin:5px 0;">${p.name}</h3>
                    <div class="position" style="color:#0f1111; font-size:1.3rem; font-weight:bold;">$${p.price.toFixed(2)}</div>
                    <div style="font-size:0.9rem; color:#007600; margin-top:5px;">Stock: ${p.stock}</div>
                    <div style="margin-top:10px; font-size:0.85rem; color:#666;">${p.description || ''}</div>
                `;
                grid.appendChild(card);
            });
        }

        function openAddProductModal() {
            document.getElementById('addProductModal').classList.add('active');
        }

        function closeAddProductModal() {
            document.getElementById('addProductModal').classList.remove('active');
            document.getElementById('addProductForm').reset();
        }

        async function submitProduct(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.innerText = 'Guardando...';
            btn.disabled = true;

            const formData = new FormData();
            formData.append('sku', document.getElementById('prod_sku').value);
            formData.append('name', document.getElementById('prod_name').value);
            formData.append('category', document.getElementById('prod_category').value);
            formData.append('price', document.getElementById('prod_price').value);
            formData.append('stock', document.getElementById('prod_stock').value);
            formData.append('description', document.getElementById('prod_desc').value);
            
            const image = document.getElementById('prod_image').files[0];
            if(image) formData.append('image', image);

            try {
                const response = await fetch(`${CATALOG_API_URL}/products`, {
                    method: 'POST',
                    body: formData
                });
                
                if(!response.ok) throw new Error("Error al guardar producto");
                
                closeAddProductModal();
                fetchProducts();
            } catch (error) {
                alert("Hubo un error al guardar el producto.");
                console.error(error);
            } finally {
                btn.innerText = 'Guardar Producto';
                btn.disabled = false;
            }
        }

        // INIT
        document.addEventListener('DOMContentLoaded', () => {
            fetchEmployees();
        });
    </script>
</body>
</html>
